<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSE Timeout Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 24px; min-height: 100vh; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; color: #e94560; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
    label { font-size: 0.9rem; color: #aaa; }
    select, input[type="number"], input[type="text"] { background: #16213e; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 8px 12px; font-size: 0.9rem; }
    input[type="number"] { width: 80px; }
    input[type="text"] { width: 360px; }
    button { padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
    .btn-connect { background: #e94560; color: #fff; }
    .btn-connect:hover { background: #c73e54; }
    .btn-disconnect { background: #555; color: #fff; }
    .btn-disconnect:hover { background: #666; }
    .btn-clear { background: transparent; color: #aaa; border: 1px solid #444; }
    .status-bar { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 20px; padding: 16px; background: #16213e; border-radius: 8px; }
    .status-item { display: flex; flex-direction: column; gap: 4px; }
    .status-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-value { font-size: 1.1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .status-connected { color: #0f0; }
    .status-disconnected { color: #f44; }
    .status-idle { color: #888; }
    .log { background: #0f3460; border-radius: 8px; padding: 16px; max-height: 500px; overflow-y: auto; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.82rem; line-height: 1.6; }
    .log-entry { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 4px 0; }
    .log-time { color: #888; }
    .log-event { color: #4fc3f7; }
    .log-error { color: #f44; }
    .log-info { color: #aaa; }
    .elapsed-big { font-size: 2rem; font-weight: 700; color: #4fc3f7; font-variant-numeric: tabular-nums; }
    .note { font-size: 0.8rem; color: #666; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>SSE Timeout Tester</h1>

  <div class="controls">
    <div>
      <label>Mode</label><br>
      <select id="mode" onchange="toggleCustomUrl()">
        <option value="ping">Ping (주기적 이벤트 전송)</option>
        <option value="silent">Silent (연결 후 무응답)</option>
        <option value="custom">Custom URL (외부 SSE 서버)</option>
      </select>
    </div>
    <div>
      <label>Ping 간격 (초)</label><br>
      <input type="number" id="interval" value="30" min="1" max="3600">
    </div>
    <div id="customUrlWrap" style="display:none;">
      <label>SSE URL</label><br>
      <input type="text" id="customUrl" placeholder="https://example.com/sse">
    </div>
    <div>
      <button class="btn-connect" id="btnConnect" onclick="connect()">Connect</button>
      <button class="btn-disconnect" id="btnDisconnect" onclick="disconnect()" style="display:none;">Disconnect</button>
      <button class="btn-clear" onclick="clearLog()">Clear Log</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span class="status-label">Status</span>
      <span class="status-value status-idle" id="statusText">Idle</span>
    </div>
    <div class="status-item">
      <span class="status-label">Elapsed</span>
      <span class="elapsed-big" id="elapsed">00:00:00</span>
    </div>
    <div class="status-item">
      <span class="status-label">Events</span>
      <span class="status-value" id="eventCount">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">Last Event</span>
      <span class="status-value" id="lastEvent">-</span>
    </div>
    <div class="status-item">
      <span class="status-label">Connection ID</span>
      <span class="status-value" id="connId">-</span>
    </div>
  </div>

  <div class="log" id="log"></div>
  <p class="note">fetch + ReadableStream 사용 (EventSource 자동 재연결 없음). 단일 TCP 커넥션으로 테스트합니다.</p>

  <script>
    let abortController = null;
    let startTime = null;
    let elapsedTimer = null;
    let eventCount = 0;
    let connectionId = 0;

    function toggleCustomUrl() {
      const mode = document.getElementById('mode').value;
      document.getElementById('customUrlWrap').style.display = mode === 'custom' ? '' : 'none';
    }

    async function connect() {
      if (abortController) disconnect();

      const mode = document.getElementById('mode').value;
      const interval = document.getElementById('interval').value;
      let url;

      if (mode === 'custom') {
        url = document.getElementById('customUrl').value.trim();
        if (!url) { log('URL을 입력하세요', 'error'); return; }
      } else {
        url = mode === 'silent' ? '/sse-silent' : `/sse?interval=${interval}`;
      }

      eventCount = 0;
      connectionId++;
      const thisConnId = connectionId;
      document.getElementById('eventCount').textContent = '0';
      document.getElementById('lastEvent').textContent = '-';
      document.getElementById('connId').textContent = `#${thisConnId}`;

      abortController = new AbortController();
      startTime = Date.now();
      startElapsedTimer();

      log(`[Conn #${thisConnId}] Connecting to ${url} (fetch + ReadableStream)...`, 'info');
      setStatus('Connecting...', 'idle');
      document.getElementById('btnConnect').style.display = 'none';
      document.getElementById('btnDisconnect').style.display = '';

      try {
        const res = await fetch(url, { signal: abortController.signal });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status} ${res.statusText}`);
        }

        setStatus('Connected', 'connected');
        log(`[Conn #${thisConnId}] Connected — HTTP ${res.status}`, 'event');

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            const elapsedSec = Math.round((Date.now() - startTime) / 1000);
            const elapsed = formatElapsed(Date.now() - startTime);
            log(`[Conn #${thisConnId}] Stream ended (done=true) at ${elapsed} (${elapsedSec}s)`, 'error');
            setStatus(`Stream ended at ${elapsed}`, 'disconnected');
            cleanup();
            return;
          }

          const text = decoder.decode(value, { stream: true });
          eventCount++;
          document.getElementById('eventCount').textContent = eventCount;
          document.getElementById('lastEvent').textContent = new Date().toLocaleTimeString();

          const lines = text.trim().split('\n');
          for (const line of lines) {
            log(`[Conn #${thisConnId}] #${eventCount}: ${line}`, 'event');
          }
        }
      } catch (err) {
        const elapsedSec = Math.round((Date.now() - startTime) / 1000);
        const elapsed = formatElapsed(Date.now() - startTime);

        if (err.name === 'AbortError') {
          log(`[Conn #${thisConnId}] Manually aborted at ${elapsed} (${elapsedSec}s)`, 'info');
          setStatus('Disconnected', 'disconnected');
        } else {
          log(`[Conn #${thisConnId}] Connection error at ${elapsed} (${elapsedSec}s): ${err.message}`, 'error');
          setStatus(`Error at ${elapsed}`, 'disconnected');
        }
        cleanup();
      }
    }

    function disconnect() {
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
    }

    function cleanup() {
      abortController = null;
      stopElapsedTimer();
      document.getElementById('btnConnect').style.display = '';
      document.getElementById('btnDisconnect').style.display = 'none';
    }

    function setStatus(text, cls) {
      const el = document.getElementById('statusText');
      el.textContent = text;
      el.className = `status-value status-${cls}`;
    }

    function startElapsedTimer() {
      stopElapsedTimer();
      elapsedTimer = setInterval(() => {
        document.getElementById('elapsed').textContent = formatElapsed(Date.now() - startTime);
      }, 1000);
    }

    function stopElapsedTimer() {
      if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
    }

    function formatElapsed(ms) {
      const s = Math.floor(ms / 1000);
      const h = String(Math.floor(s / 3600)).padStart(2, '0');
      const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      const sec = String(s % 60).padStart(2, '0');
      return `${h}:${m}:${sec}`;
    }

    function log(msg, type) {
      const el = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}"></span>`;
      div.querySelector(`.log-${type}`).textContent = msg;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }
  </script>
</body>
</html>
